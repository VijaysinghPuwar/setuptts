name: Build Release

# Triggers:
#   - Push of a version tag:  git tag v1.5.2 && git push origin v1.5.2
#   - Manual run from GitHub Actions UI (workflow_dispatch)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. 1.5.2)"
        required: false
        default: "dev"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # macOS build
  # Produces: SetupTTS-macOS.dmg  (drag-to-Applications)
  #           SetupTTS-macOS.zip  (fallback — extract and double-click)
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS release
    runs-on: macos-latest   # Apple Silicon (arm64); runs on Intel Macs via Rosetta 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with PyInstaller
        run: python -m PyInstaller setuptts.spec --noconfirm

      - name: Verify bundle assets
        run: |
          RES=dist/SetupTTS.app/Contents/Resources
          test -f "$RES/app/assets/styles/app.qss" || (echo "ERROR: QSS missing"    && exit 1)
          test -f "$RES/app/assets/icons/app.png"  || (echo "ERROR: icon missing"   && exit 1)
          test -d "$RES/edge_tts"                  || (echo "ERROR: edge_tts missing" && exit 1)
          echo "Bundle assets verified OK"
          echo "Bundle size: $(du -sh dist/SetupTTS.app | cut -f1)"

      - name: Create DMG (drag-to-Applications layout)
        run: |
          # create-dmg exits 1 for unsigned apps (codesign warning) even when the
          # DMG is written successfully — || true tolerates that expected exit code.
          create-dmg \
            --volname "SetupTTS" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SetupTTS.app" 175 190 \
            --hide-extension "SetupTTS.app" \
            --app-drop-link 425 190 \
            "SetupTTS-macOS.dmg" \
            "dist/SetupTTS.app" || true
          # Assert the DMG actually exists — a real failure would also exit 1
          test -f "SetupTTS-macOS.dmg" || (echo "ERROR: DMG was not created" && exit 1)
          echo "DMG size: $(du -sh SetupTTS-macOS.dmg | cut -f1)"

      - name: Create zip (fallback)
        run: |
          ditto -c -k --keepParent dist/SetupTTS.app "SetupTTS-macOS.zip"
          echo "Zip size: $(du -sh SetupTTS-macOS.zip | cut -f1)"

      - name: Verify zip integrity
        run: |
          TMPDIR=$(mktemp -d)
          ditto -x -k "SetupTTS-macOS.zip" "$TMPDIR"
          test -x "$TMPDIR/SetupTTS.app/Contents/MacOS/SetupTTS" \
            || (echo "ERROR: binary not executable after extraction" && exit 1)
          rm -rf "$TMPDIR"
          echo "Zip verified OK"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ steps.ver.outputs.version }}
          path: SetupTTS-macOS.dmg
          if-no-files-found: error

      - name: Upload macOS zip
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip-${{ steps.ver.outputs.version }}
          path: SetupTTS-macOS.zip
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Windows build
  #
  # Two separate PyInstaller builds for two distinct use cases:
  #
  #   setuptts.spec          → onedir  → dist\SetupTTS\   (for Inno Setup installer)
  #   setuptts_portable.spec → onefile → dist_portable\SetupTTS.exe (portable zip)
  #
  # Why two builds?
  #   onedir is reliable when installed by Inno Setup (files stay together in
  #   Program Files, launched via Start Menu shortcut).  For portable use, onedir
  #   breaks because Windows Explorer lets users run EXEs from inside a zip
  #   without extracting — the _internal/ folder stays in the zip → python312.dll
  #   not found.  onefile embeds everything inside the EXE so it runs from
  #   anywhere with no folder-structure requirement.
  #
  # Produces:
  #   SetupTTS-Windows-Installer.exe  (guided installer — recommended)
  #   SetupTTS-Windows-Portable.zip   (single EXE — extract and double-click)
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build installer (onedir)
        run: python -m PyInstaller setuptts.spec --noconfirm

      - name: Verify onedir build
        shell: pwsh
        run: |
          if (!(Test-Path "dist\SetupTTS\SetupTTS.exe")) {
            Write-Error "dist\SetupTTS\SetupTTS.exe not found"; exit 1
          }
          $exeSize = [math]::Round((Get-Item "dist\SetupTTS\SetupTTS.exe").Length / 1MB, 1)
          $dirSize = [math]::Round((Get-ChildItem -Recurse "dist\SetupTTS" |
            Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "Installer build: SetupTTS.exe ${exeSize} MB  |  folder total ${dirSize} MB"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $ver       = "${{ steps.ver.outputs.version }}"
          $iscc      = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $sourceDir = (Resolve-Path "dist\SetupTTS").Path
          $outputDir = (New-Item -ItemType Directory -Force -Path "installer_out").FullName

          & $iscc `
            "/DAppVersion=$ver" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "installers\windows.iss"

          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed (exit $LASTEXITCODE)" }

          $installer = "$outputDir\SetupTTS-Windows-Installer.exe"
          if (!(Test-Path $installer)) {
            Write-Error "Installer not found: $installer"; exit 1
          }
          $size = [math]::Round((Get-Item $installer).Length / 1MB, 1)
          Write-Host "Installer: ${size} MB"
          Copy-Item $installer "SetupTTS-Windows-Installer.exe"

      - name: Build portable (onefile)
        run: |
          python -m PyInstaller setuptts_portable.spec --noconfirm --distpath dist_portable

      - name: Verify portable EXE
        shell: pwsh
        run: |
          if (!(Test-Path "dist_portable\SetupTTS.exe")) {
            Write-Error "dist_portable\SetupTTS.exe not found"; exit 1
          }
          $size = [math]::Round((Get-Item "dist_portable\SetupTTS.exe").Length / 1MB, 1)
          Write-Host "Portable EXE: ${size} MB"

      - name: Create portable zip
        shell: pwsh
        run: |
          # Zip only the single EXE — users extract and double-click SetupTTS.exe
          Compress-Archive -Force -Path "dist_portable\SetupTTS.exe" `
            -DestinationPath "SetupTTS-Windows-Portable.zip"
          $size = [math]::Round((Get-Item "SetupTTS-Windows-Portable.zip").Length / 1MB, 1)
          Write-Host "Portable zip: ${size} MB"

      - name: Verify portable zip
        shell: pwsh
        run: |
          $tmp = New-Item -ItemType Directory -Path "$env:TEMP\st_verify"
          Expand-Archive -Path "SetupTTS-Windows-Portable.zip" -DestinationPath $tmp.FullName
          if (!(Test-Path "$($tmp.FullName)\SetupTTS.exe")) {
            Write-Error "SetupTTS.exe missing after extraction"; exit 1
          }
          $size = [math]::Round((Get-Item "$($tmp.FullName)\SetupTTS.exe").Length / 1MB, 1)
          Write-Host "Portable zip verified OK — SetupTTS.exe ${size} MB"
          Remove-Item -Recurse -Force $tmp.FullName

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.ver.outputs.version }}
          path: SetupTTS-Windows-Installer.exe
          if-no-files-found: error

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ steps.ver.outputs.version }}
          path: SetupTTS-Windows-Portable.zip
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release (tag pushes only)
  # Attaches all four user-ready artifacts to the release
  # ────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-${{ steps.ver.outputs.version }}
          path: .

      - name: Download macOS zip
        uses: actions/download-artifact@v4
        with:
          name: macos-zip-${{ steps.ver.outputs.version }}
          path: .

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ steps.ver.outputs.version }}
          path: .

      - name: Download Windows portable zip
        uses: actions/download-artifact@v4
        with:
          name: windows-portable-${{ steps.ver.outputs.version }}
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SetupTTS v${{ steps.ver.outputs.version }}
          body: |
            ## SetupTTS v${{ steps.ver.outputs.version }}

            Convert any text to natural-sounding audio using Microsoft Neural voices.
            No Python, no terminal, no setup required.

            > **SetupTTS is a hybrid app:** text preparation and file writing happen locally; speech synthesis is performed by Microsoft's Neural TTS service (speech.platform.bing.com). Low CPU usage during generation is expected.

            ---

            ### What's new in v${{ steps.ver.outputs.version }}

            #### Resumable long-form generation
            - **True chunk checkpointing** — every completed logical chunk is now staged on disk with a persisted manifest and source text snapshot while the job is running.
            - **Resume after failure or restart** — if a long audiobook job dies on chunk 18, SetupTTS now preserves chunks 1–17 and can continue from the failed section instead of starting from zero.
            - **Safe final assembly** — the final MP3 is only assembled after all staged chunks are present, so partial failures never poison the destination output file.

            #### Stronger recovery for repeated no-audio failures
            - **No-audio and timeout failures are classified separately** — SetupTTS now distinguishes repeated provider no-audio responses from slow timeout paths and adapts recovery accordingly.
            - **Earlier progressive fallback** — doomed full-size retries stop sooner; the worker falls back to smaller recovery chunks and then preserves progress if the provider still will not return audio.
            - **Clearer preserved-progress errors** — failure dialogs now explain that completed audio was preserved and that the job can be resumed from the failed chunk.

            #### Long English job reliability safeguards
            - **Long-job preflight still runs before the full export** — SetupTTS confirms that Microsoft actually returns audio before it commits to a large run.
            - **Multilingual voice caution for English narration** — long English jobs using voices like `en-US-AndrewMultilingualNeural` now get a stability warning plus a same-locale non-multilingual recommendation when available.
            - **Rolling health backoff** — repeated no-audio/timeout patterns force upcoming chunks into a safer smaller-size mode earlier in the job instead of waiting for a catastrophic failure.

            ---

            ### Carried forward from v1.3.x
            - Real-time generation speed display (`1,250 chars/s`) in active job rows.
            - LOCAL / REMOTE / WAIT color-coded stage badges on each job.
            - Per-chunk retry with exponential backoff (2 s → 4 s → 8 s → 16 s).
            - "Took" column in Recent Conversions showing real generation time.
            - Long-form audiobook support with independent per-chunk retry.

            ---

            ### Download

            | Platform | File | Description |
            |----------|------|-------------|
            | **macOS** (Apple Silicon + Intel via Rosetta) | `SetupTTS-macOS.dmg` | Drag-to-Applications installer |
            | **macOS** (Apple Silicon + Intel via Rosetta) | `SetupTTS-macOS.zip` | Fallback — extract and run |
            | **Windows** 10/11 | `SetupTTS-Windows-Installer.exe` | Guided installer |
            | **Windows** 10/11 | `SetupTTS-Windows-Portable.zip` | No install needed |

            ---

            ### macOS install

            **Option 1 — DMG (recommended)**
            1. Download `SetupTTS-macOS.dmg`
            2. Open the DMG and drag **SetupTTS** to **Applications**
            3. Eject the DMG
            4. Open SetupTTS from Applications
            5. **First launch only:** if macOS blocks the app, right-click → Open

            **Option 2 — Zip**
            1. Download and unzip `SetupTTS-macOS.zip`
            2. Double-click **SetupTTS.app**
            3. **First launch only:** right-click → Open if macOS blocks it

            > The Gatekeeper prompt (right-click → Open) is only needed once on the very first launch. After that, the app opens normally.

            ---

            ### Windows install

            **Option 1 — Installer (recommended)**
            1. Download `SetupTTS-Windows-Installer.exe`
            2. Double-click and follow the wizard (takes ~10 seconds)
            3. Launch SetupTTS from the Start Menu or desktop shortcut

            **Option 2 — Portable (no install)**
            1. Download `SetupTTS-Windows-Portable.zip`
            2. Extract it (right-click → Extract All)
            3. Double-click **SetupTTS.exe**

            ---

            ### Requirements
            - Internet connection required (voices stream from Microsoft's Neural TTS service)
            - macOS 12 Monterey or later
            - Windows 10 or 11 (64-bit)
          files: |
            SetupTTS-macOS.dmg
            SetupTTS-macOS.zip
            SetupTTS-Windows-Installer.exe
            SetupTTS-Windows-Portable.zip
          draft: false
          prerelease: false
